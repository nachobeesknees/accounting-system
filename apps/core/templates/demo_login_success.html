<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logged In - Accounting System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        .success-icon {
            font-size: 64px;
            margin-bottom: 20px;
            animation: bounce 0.6s ease;
        }

        @keyframes bounce {
            0% { transform: scale(0.3); opacity: 0; }
            50% { opacity: 1; }
            70% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }

        h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 8px;
        }

        .user-info {
            color: #667eea;
            font-weight: 600;
            margin-bottom: 24px;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-direction: column;
        }

        a {
            display: inline-block;
            padding: 12px 24px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s ease;
            font-size: 14px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #333;
            border: 2px solid #eee;
        }

        .btn-secondary:hover {
            border-color: #667eea;
            color: #667eea;
        }

        .redirect-info {
            color: #666;
            font-size: 13px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        @media (max-width: 500px) {
            .container {
                padding: 24px;
            }

            h1 {
                font-size: 22px;
            }

            .success-icon {
                font-size: 48px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-icon">✅</div>
        <h1>Welcome!</h1>
        <div class="user-info">Logged in as <strong>{{ user.username }}</strong></div>

        <div class="button-group">
            <a href="{{ admin_url }}" class="btn-primary">Go to Admin Panel</a>
            <a href="{{ api_docs_url }}" class="btn-secondary">View API Documentation</a>
        </div>

        <div class="redirect-info">
            You can now access the admin panel and manage entities, accounts, and transactions.
        </div>
    </div>

    <script>
        // Auto-redirect to admin after 2 seconds
        setTimeout(() => {
            window.location.href = '{{ admin_url }}';
        }, 2000);
    </script>
</body>
</html>
