<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Successful - Accounting System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            padding: 60px;
            text-align: center;
        }

        .checkmark {
            width: 80px;
            height: 80px;
            margin: 0 auto 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
        }

        h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 15px;
        }

        p {
            color: #666;
            font-size: 16px;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .user-info {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            text-align: left;
        }

        .user-info strong {
            display: block;
            color: #666;
            font-size: 13px;
            margin-bottom: 5px;
        }

        .user-info p {
            color: #333;
            font-size: 16px;
            margin: 0;
        }

        .buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f4ff;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .btn-secondary:hover {
            background: #667eea;
            color: white;
        }

        .countdown {
            color: #999;
            font-size: 13px;
            margin-top: 20px;
        }

        @media (max-width: 600px) {
            .buttons {
                grid-template-columns: 1fr;
            }

            .container {
                padding: 40px 25px;
            }

            h1 {
                font-size: 24px;
            }
        }
    </style>
    <script>
        // Auto-redirect to admin after 3 seconds
        let countdown = 3;
        function updateCountdown() {
            if (countdown > 0) {
                document.getElementById('countdown-text').textContent = countdown;
                countdown--;
                setTimeout(updateCountdown, 1000);
            } else {
                window.location.href = '{{ admin_url }}';
            }
        }
        window.addEventListener('load', updateCountdown);
    </script>
</head>
<body>
    <div class="container">
        <div class="checkmark">✓</div>

        <h1>Login Successful! 🎉</h1>

        <p>Welcome to the Accounting System. You're now logged in and ready to explore.</p>

        <div class="user-info">
            <strong>Logged in as:</strong>
            <p>{{ user.get_full_name|default:user.username }}</p>
        </div>

        <div class="buttons">
            <a href="{{ admin_url }}" class="btn btn-primary">Go to Admin</a>
            <a href="/" class="btn btn-secondary">Return Home</a>
        </div>

        <div class="countdown">
            Redirecting to Admin in <span id="countdown-text">3</span> seconds...
        </div>
    </div>
</body>
</html>
