services:
  - type: web
    name: accounting-system
    runtime: python
    pythonVersion: 3.12
    plan: standard
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 4
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: accounting-system.onrender.com
      - key: ENVIRONMENT
        value: production
    autoDeploy: true
    domains:
      - accounting-system.onrender.com

  - type: pserv
    name: accounting-system-db
    runtime: postgresql
    plan: standard
    ipAllowList: []
    envVars:
      - key: POSTGRES_DB
        value: accounting_system
