app = "accounting-system"
primary_region = "ord"

[build]
dockerfile = "Dockerfile"

[env]
DEBUG = "False"
ENVIRONMENT = "production"

[[services]]
internal_port = 8000
protocol = "tcp"
processes = ["app"]

[services.concurrency]
hard_limit = 100
soft_limit = 80

[[services.ports]]
handlers = ["http"]
port = 80

[[services.ports]]
handlers = ["tls", "http"]
port = 443

[checks]
[checks.http_check]
grace_period = "10s"
interval = "30s"
method = "GET"
path = "/api/auth/health/"
timeout = "5s"

[[mounts]]
source = "pg_data"
destination = "/var/lib/postgresql/data"
