app = "accounting-system"
primary_region = "ord"
console_command = "/app/manage.py shell"

[build]
dockerfile = "Dockerfile"

[env]
DEBUG = "False"
ENVIRONMENT = "production"
ALLOWED_HOSTS = "accounting-system.fly.dev"
LOAD_DEMO_DATA = "True"

[[services]]
internal_port = 8000
protocol = "tcp"
processes = ["app"]

[services.concurrency]
hard_limit = 100
soft_limit = 80

[[services.ports]]
handlers = ["http"]
port = 80

[[services.ports]]
handlers = ["tls", "http"]
port = 443

[checks]
[checks.http_check]
grace_period = "10s"
interval = "30s"
method = "GET"
path = "/api/auth/health/"
timeout = "5s"

# PostgreSQL volume for persistent database
[[mounts]]
source = "pg_data"
destination = "/var/lib/postgresql/data"

# Redis volume for background jobs
[[mounts]]
source = "redis_data"
destination = "/var/lib/redis"
