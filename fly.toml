# fly.toml app configuration file generated for accounting-system-demo on 2026-05-12T18:25:14-06:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'accounting-system-demo'
primary_region = 'ord'
console_command = '/code/manage.py shell'

[build]
dockerfile = "Dockerfile"


[env]
  PORT = '8000'
  DEBUG = 'False'
  ENVIRONMENT = 'production'
  ALLOWED_HOSTS = 'accounting-system-demo.fly.dev'
  LOAD_DEMO_DATA = 'True'
  SECRET_KEY = 'django-insecure-erp-demo-key-change-in-production-2026'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

[[statics]]
  guest_path = '/code/static'
  url_prefix = '/static/'
